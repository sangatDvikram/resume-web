name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ESLint + TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint — API
        working-directory: apps/api
        run: yarn lint

      - name: Lint — Web
        working-directory: apps/web
        run: yarn lint

      - name: TypeScript check — API
        working-directory: apps/api
        run: npx tsc --noEmit -p tsconfig.build.json

      - name: TypeScript check — Web
        working-directory: apps/web
        run: npx tsc --noEmit

  # ─── Unit Tests ──────────────────────────────────────────────────────────
  test-api:
    name: Unit tests — API (Jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run tests
        working-directory: apps/api
        run: yarn test --passWithNoTests --ci
        env:
          NODE_ENV: test
          DATABASE_URL: 'postgresql://test:test@localhost:5432/test'

  # ─── Build check — Next.js ───────────────────────────────────────────────
  build-web:
    name: Build check — Next.js
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        working-directory: apps/web
        run: yarn build
        env:
          NEXT_PUBLIC_API_URL: 'https://api.portfolio.example.com'
          REVALIDATE_SECRET: 'ci-placeholder-secret'
          JWT_PUBLIC_KEY: 'ci-placeholder-key'

  # ─── Build check — NestJS ────────────────────────────────────────────────
  build-api:
    name: Build check — NestJS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        working-directory: apps/api
        run: yarn build
