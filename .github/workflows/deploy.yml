name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ─── Run Migrations ────────────────────────────────────────────────────────
  migrate:
    name: TypeORM Migrations (Neon — unpooled connection)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build API (needed for ts-node migration path)
        working-directory: apps/api
        run: yarn build

      - name: Run migrations
        working-directory: apps/api
        run: yarn migration:run
        env:
          NODE_ENV: production
          # Use the UNPOOLED (direct) connection for DDL migrations
          DATABASE_URL: ${{ secrets.DATABASE_URL_UNPOOLED }}
          DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
          TYPEORM_CLI: 'true'

  # ─── Deploy API (Railway) ──────────────────────────────────────────────────
  deploy-api:
    name: Deploy API → Railway
    runs-on: ubuntu-latest
    needs: migrate
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        working-directory: apps/api
        run: railway up --service api --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ─── Deploy Web (Vercel) ───────────────────────────────────────────────────
  # Note: Vercel deploys automatically via the Vercel GitHub integration.
  # This job exists only to confirm the deploy was triggered and optionally
  # run post-deploy smoke tests.
  confirm-web-deploy:
    name: Confirm Vercel deploy
    runs-on: ubuntu-latest
    needs: deploy-api
    environment: production
    steps:
      - name: Wait for Vercel deployment
        run: echo "Vercel deploys automatically via GitHub integration. API is live."
