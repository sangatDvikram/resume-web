# Portfolio CMS — psmux local config
set -g default-shell "C:/Program Files/Git/bin/bash.exe"
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g history-limit 20000
set -g escape-time 50
set -g mode-keys vi
set -g focus-events on

# Status bar
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=colour235,fg=colour136"
set -g status-left "#[bold][#S]#[nobold] "
set -g status-right "#[fg=colour245]%H:%M  %d-%b-%y"
set -g status-left-style "fg=colour214,bold"
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=colour214,bold] #I:#W "
set -g window-status-current-style "fg=colour214,bold"
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour214"

# Splits that keep current path
bind-key h split-window -h -c "#{pane_current_path}"
bind-key v split-window -v -c "#{pane_current_path}"
bind-key c new-window -c "#{pane_current_path}"
