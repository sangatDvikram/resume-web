# ──────────────────────────────────────────────────────────────────────────────
# Railway config-as-code for apps/mcp (MCP server).
#
# This is a SEPARATE Railway service from apps/api.
# Add it to the same Railway project so it can share internal networking.
#
# First-time setup:
#   1. In your Railway project, click "New Service" → "GitHub Repo".
#   2. Select this repository.
#   3. In the service settings → "Config file path", set:
#        apps/mcp/railway.toml
#   4. Set Root Directory to /  (repo root — build context must be the root
#      so the Dockerfile can COPY all workspace package.json stubs).
#   5. Add required environment variables:
#        railway variables set API_BASE_URL="https://<api-internal-railway-url>"
#      Optional (defaults to "default"):
#        railway variables set RESUME_SLUG="default"
#
# MCP endpoint exposed at:   https://<service>.railway.app/mcp
# Health endpoint exposed at: https://<service>.railway.app/health
# ──────────────────────────────────────────────────────────────────────────────

[build]
  builder        = "DOCKERFILE"
  dockerfilePath = "apps/mcp/Dockerfile"

  # Only rebuild when MCP-relevant files change.
  watchPatterns = [
    "apps/mcp/**",
    "package.json",
    "yarn.lock",
    ".yarnrc.yml",
    "apps/mcp/Dockerfile"
  ]

[deploy]
  startCommand = "node dist/index.js"

  # /health returns { "ok": true } once the HTTP server is up.
  healthcheckPath    = "/health"
  healthcheckTimeout = 30

  restartPolicyType       = "ON_FAILURE"
  restartPolicyMaxRetries = 3

# ── Non-secret environment variables ─────────────────────────────────────────
# API_BASE_URL must be set via Railway dashboard / CLI — it contains the
# internal Railway URL of the API service (e.g. https://api.railway.internal).
[deploy.env]
  NODE_ENV    = "production"
  PORT        = "3000"
  RESUME_SLUG = "default"
