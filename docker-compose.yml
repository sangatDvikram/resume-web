version: '3.9'

services:
  # ─── Local PostgreSQL 16 ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: portfolio_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-portfolio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portfolio_dev_secret}
      POSTGRES_DB: ${POSTGRES_DB:-portfolio_dev}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-portfolio} -d ${POSTGRES_DB:-portfolio_dev}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── pgAdmin (optional) ───────────────────────────────────────────────────
  # Uncomment to access database via browser at http://localhost:5050
  # pgadmin:
  #   image: dpage/pgadmin4:latest
  #   container_name: portfolio_pgadmin
  #   restart: unless-stopped
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: admin@portfolio.local
  #     PGADMIN_DEFAULT_PASSWORD: admin
  #   ports:
  #     - '5050:80'
  #   depends_on:
  #     - postgres

volumes:
  postgres_data:
    driver: local
