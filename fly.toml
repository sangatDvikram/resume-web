# ──────────────────────────────────────────────────────────────────────────────
# Fly.io config-as-code for apps/api (NestJS 10).
#
# Mirrors railway.toml at the repo root. Build context is the repo root so the
# multi-stage Dockerfile can COPY workspace package.json stubs.
#
# First-time setup:
#   1. flyctl launch --no-deploy --copy-config --name <app-name> --region <region>
#      (when prompted, decline Postgres/Redis — we use Neon for Postgres.)
#   2. Set required secrets (never commit these):
#        flyctl secrets set DATABASE_URL="..."
#        flyctl secrets set DATABASE_URL_UNPOOLED="..."
#        flyctl secrets set JWT_PRIVATE_KEY="..."
#        flyctl secrets set JWT_PUBLIC_KEY="..."
#        flyctl secrets set SESSION_SECRET="..."
#        flyctl secrets set SESSION_COOKIE_NAME="adminjs"
#        flyctl secrets set CLOUDINARY_CLOUD_NAME="..."
#        flyctl secrets set CLOUDINARY_API_KEY="..."
#        flyctl secrets set CLOUDINARY_API_SECRET="..."
#        flyctl secrets set REVALIDATE_SECRET="..."
#        flyctl secrets set NEXT_REVALIDATE_URL="https://<web>/api/revalidate"
#        flyctl secrets set FRONTEND_URL="https://<web-host>"
#        flyctl secrets set ADMIN_EMAIL="..."
#        flyctl secrets set ADMIN_PASSWORD="..."
#   3. Migrations run via GitHub Actions (deploy.yml) BEFORE this app deploys —
#      never configure a `release_command` here that runs them on startup.
#   4. flyctl deploy
# ──────────────────────────────────────────────────────────────────────────────

app            = "portfolio-api"
primary_region = "iad"

[build]
  # Multi-stage Dockerfile at the repo root. Fly's build context is the
  # directory containing this fly.toml (repo root), matching Railway.
  dockerfile = "Dockerfile"

# ── Non-secret environment variables ─────────────────────────────────────────
# Secrets (DATABASE_URL, JWT_*, CLOUDINARY_*, SESSION_SECRET, REVALIDATE_*)
# must be set via `flyctl secrets set` — never committed here.
[env]
  NODE_ENV        = "production"
  PORT            = "3001"
  SWAGGER_ENABLED = "false"
  DB_SSL          = "true"
  THROTTLE_TTL    = "60"
  THROTTLE_LIMIT  = "20"

[http_service]
  internal_port       = 3001
  force_https         = true
  # AdminJS keeps a persistent session store + DB pool — do not auto-stop.
  auto_stop_machines  = false
  auto_start_machines = true
  min_machines_running = 1
  processes           = ["app"]

  # Mirrors railway.toml overlapSeconds=30 / drainingSeconds=10. Fly handles
  # zero-downtime via `[deploy] strategy = "rolling"` below.
  [http_service.concurrency]
    type       = "requests"
    soft_limit = 200
    hard_limit = 250

# AdminJS + TypeORM boot takes ~3-6 s; give Fly enough time before marking
# the deployment unhealthy. Matches railway.toml healthcheckTimeout=60.
[[http_service.checks]]
  grace_period  = "30s"
  interval      = "15s"
  method        = "GET"
  timeout       = "5s"
  path          = "/v1/health"

[deploy]
  # Matches the CMD in the Dockerfile runtime stage (set automatically, but
  # also configurable via `release_command` if migrations ever move here).
  strategy = "rolling"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "1gb"
