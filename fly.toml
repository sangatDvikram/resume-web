# ──────────────────────────────────────────────────────────────────────────────
# Fly.io configuration for the Portfolio CMS API (apps/api, NestJS 10).
#
# Bootstrap once with:
#   fly launch --no-deploy --copy-config --name <your-app-name> --region <region>
# Then set secrets:
#   fly secrets set DATABASE_URL=... DATABASE_URL_UNPOOLED=... JWT_PRIVATE_KEY="..." \
#                   JWT_PUBLIC_KEY="..." SESSION_SECRET=... CLOUDINARY_CLOUD_NAME=... \
#                   CLOUDINARY_API_KEY=... CLOUDINARY_API_SECRET=... \
#                   REVALIDATE_SECRET=... NEXT_REVALIDATE_URL=... FRONTEND_URL=...
# Run migrations once (uses DATABASE_URL_UNPOOLED set as a secret):
#   fly ssh console -C "node /app/apps/api/node_modules/typeorm/cli.js -d /app/apps/api/dist/database/data-source.js migration:run"
# Deploy:
#   fly deploy
# ──────────────────────────────────────────────────────────────────────────────

app = "portfolio-cms-api"
primary_region = "iad"

# ── Build ────────────────────────────────────────────────────────────────────
# Dockerfile lives at the repo root so the whole monorepo is the build context.
[build]
  dockerfile = "Dockerfile"

# ── Non-secret runtime env ───────────────────────────────────────────────────
# Secrets (DATABASE_URL, JWT_*, SESSION_SECRET, CLOUDINARY_*, REVALIDATE_*)
# must be set via `fly secrets set` — never in this file.
[env]
  NODE_ENV         = "production"
  PORT             = "3001"
  SWAGGER_ENABLED  = "false"
  DB_SSL           = "true"
  THROTTLE_TTL     = "60"
  THROTTLE_LIMIT   = "20"

# ── HTTP service (the only process) ──────────────────────────────────────────
[http_service]
  internal_port       = 3001
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  # AdminJS + express-session cold-start is ~3-6s; keep one machine warm so the
  # admin panel is usable and sessions aren't lost on every wake.
  min_machines_running = 1
  processes           = ["app"]

  [http_service.concurrency]
    type       = "requests"
    soft_limit = 100
    hard_limit = 200

  # Health check hits the public GET /v1/health endpoint (AppController).
  [[http_service.checks]]
    grace_period = "30s"
    interval     = "15s"
    method       = "GET"
    timeout      = "5s"
    path         = "/v1/health"

# ── Process group ────────────────────────────────────────────────────────────
# Matches the CMD in the Dockerfile; declared explicitly so `fly scale` works.
[processes]
  app = "node dist/main.js"

# ── Machine size ─────────────────────────────────────────────────────────────
# AdminJS + TypeORM + ESM dynamic imports comfortably fit in 512 MB.
# Bump memory if you observe OOM during AdminJS startup.
[[vm]]
  size      = "shared-cpu-1x"
  memory    = "512mb"
  cpu_kind  = "shared"
  cpus      = 1
  processes = ["app"]
